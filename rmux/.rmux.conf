# rmux 默认用 `-NoProfile` 启动 pwsh,导致个人 profile(oh-my-posh、PSReadLine 等)不加载。
# 显式指定启动命令(不带 -NoProfile)即可让 profile 正常加载。
#   - default-command: 覆盖每个新 session 的第一个窗口
#   - 下面的 bind:    覆盖后续新建窗口 / 分屏(default-command 对它们不生效)
set -g default-command "pwsh.exe -NoLogo"
bind c new-window "pwsh.exe -NoLogo"

bind _ splitw -v "pwsh.exe -NoLogo" # split horizonally
bind | splitw -h "pwsh.exe -NoLogo" # split vertically

# rmux 默认 TERM=tmux-256color,但 Git Bash 的 terminfo 没有该条目,
# 会导致 less/git diff 等报 "unknown terminal type"。改用普遍存在的 screen-256color。
set -g default-terminal "screen-256color"

set -g status-bg black
set -g status-fg yellow
set -g mouse on
